# Daily sync: finalize recent scores, refresh fatigue + predictions, load upcoming slate.
#
# Runs daily year-round. scripts/daily_update.py self-gates on the NBA season:
# during the offseason it logs a skip and exits 0 (no DB or API work), so there is
# no cron cadence to switch between offseason and regular season.
#
# Vercel `/api/cron/update` is configured separately in vercel.json.
#
# Secrets (required for the in-season path; the offseason skip needs none):
#   DATABASE_URL — Supabase Postgres connection string (postgresql://...)
#   Configure at: GitHub repo → Settings → Secrets and variables → Actions → New repository secret

name: Daily NBA update

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: >-
          daily = normal pipeline (season-gated). resync-schedule = re-run the CDN
          schedule fetch only (NOT season-gated) — repairs games.date rows via the
          self-healing upsert; use for date-convention fixes or schedule shifts.
        type: choice
        default: daily
        options:
          - daily
          - resync-schedule

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # Normal path: cron runs (inputs.task is empty) and manual "daily" dispatches.
      - name: Run daily update
        if: ${{ github.event.inputs.task != 'resync-schedule' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily_update.py

      # Manual repair path: re-run the CDN schedule fetch only. Bypasses the season
      # gate (fetch_nba_schedule_cdn.main has none) so games.date rows can be
      # repaired in the offseason via the self-healing upsert.
      - name: Resync schedule dates (manual)
        if: ${{ github.event.inputs.task == 'resync-schedule' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/fetch_nba_schedule_cdn.py
